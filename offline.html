<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Offline | Abhishek S. Raut</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            background: #0f172a;
            color: #fff;
        }

        .offline-container {
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-retry {
            display: inline-block;
            padding: 12px 24px;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            border: 0;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            transition: transform 0.2s ease;
        }

        .btn-retry:hover {
            transform: scale(1.05);
        }

        .btn-retry:focus {
            outline: none;
        }

        .btn-retry:focus-visible {
            outline: 2px solid #38bdf8;
            outline-offset: 2px;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="offline-container">
        <h1>Offline</h1>
        <p>It seems you're currently disconnected. Don't worry, the portfolio is designed to work offline once visited,
            but some resources might be missing.</p>
        <button type="button" id="retry-btn" class="btn-retry">Try Again</button>
    </div>
    <script>
        const retryBtn = document.getElementById('retry-btn');
        if (retryBtn) retryBtn.addEventListener('click', () => window.location.reload());
    </script>
</body>

</html>
